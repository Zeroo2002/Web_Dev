<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome HTML🚀</title>
</head>
<body>
        <center>
                <h1>Welcome to Awesome HTML ❤️</h1>
        </center>

        <!-- href: hyperlink reference -->
        <a href="https://google.com">Google</a>


        <!-- list: ordered, unordered and description -->
        
        <!-- ordered -->
        <ol>
                <li>Badminton</li>
                <li>Basketball</li>
                <li>Project IGI</li>
                <li>Call Of Duty</li>
        </ol>

        <!-- unordered -->
        <ul>
            <li>Water</li>
            <li>Milk</li>
            <li>Tea</li>
            <li>Coffee</li>
        </ul>

        <!-- descriptive -->
        <dl>
            <dt>Hindi</dt>
            <dd>-A language spoken by mainly Indians</dd>
            <dt>Python</dt>
            <dd>-A programming language</dd>
        </dl>
</body>
</html>
