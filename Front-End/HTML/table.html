<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables of HTML</title>
   <style>
            table, thead, tbody, tr, td{
                border: 1px black solid;
                border-collapse: collapse;
            }
    </style>
</head>
<body>
            <center>
                <h1>Welcome to HTML</h1>
            </center>

            <!-- Tables -->


            <!-- Method:1 -->
            <table border="1">           <!--- Way to add border -->
                    <thead>
                            <tr>
                                <td>SNo.</td>
                                <td>Name</td>
                                <td>Age</td>
                            </tr>
                            <tr>
                                <td>1011</td>
                                <td>Zero</td>
                                <td>21</td>
                            </tr>
                            <tr>
                                <td>1016</td>
                                <td>Palvi</td>
                                <td>21</td>
                            </tr>
                            <tr>
                                <td>1020</td>
                                <td>Urva</td>
                                <td>20</td>
                            </tr>
                            <tr>
                                <td>1021</td>
                                <td>Chanta</td>
                                <td>21</td>
                            </tr>
                    </thead>
            </table>


            <!-- Method 2: -->
            <table border="1">
                    <tr>
                            <th>Name</th>
                            <th>Profession</th>
                            <th>DOB</th>
                    </tr>
                    <tr>
                            <td>Zero</td>
                            <td>Student</td>
                            <td>30 Feb, 2002</td>
                    </tr>
                    <tr>
                            <td>Mum</td>
                            <td>Housewife</td>
                            <td>0 March, 1981</td>
                    </tr>
                    <tr>
                            <td>Pops</td>
                            <td>Cultivator</td>
                            <td>40 April, 1974</td>
                    </tr>
            </table>
</body>
</html>
